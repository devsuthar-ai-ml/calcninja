<!DOCTYPE html>
<html lang="hi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD कैलकुलेटर - Fixed Deposit | CalcNinja</title>
<meta name="description" content="फ्री FD कैलकुलेटर। Fixed Deposit maturity amount को तुरंत निकालें।">
<meta name="keywords" content="fd calculator, fixed deposit, fd interest calculator">
<link rel="canonical" href="https://calcninja.vercel.app/hi/fd-calculator">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header id="site-header">
  <a href="/" class="logo">Calc🥷Ninja</a>
  <nav class="desktop-nav"><a href="/">होम</a><a href="/tools/fd-calculator">English</a></nav>
  <div class="header-actions"><button class="theme-toggle" onclick="toggleTheme()">🌙</button><button class="hamburger" onclick="toggleMenu()">☰</button></div>
</header>

<nav class="mobile-nav" id="mobileNav">
  <a href="/" onclick="toggleMenu()">होम</a><a href="/tools/fd-calculator" onclick="toggleMenu()">English</a>
</nav>

<main>
  <div class="tool-page">
    <div class="tool-header">
      <h1>🏦 FD कैलकुलेटर</h1>
      <p>Fixed Deposit maturity को तुरंत निकालें</p>
    </div>

    <div class="tool-content">
      <div class="tool-form">
        <div class="form-group">
          <label>Principal (₹)</label>
          <input type="number" id="fdPrincipal" value="100000" min="0" step="10000" oninput="calculateFD()" class="form-input">
        </div>
        <div class="form-group">
          <label>ब्याज दर (%)</label>
          <input type="number" id="fdRate" value="7" min="0" max="10" step="0.25" oninput="calculateFD()" class="form-input">
        </div>
        <div class="form-group">
          <label>अवधि (साल)</label>
          <input type="number" id="fdYears" value="3" min="1" max="10" step="1" oninput="calculateFD()" class="form-input">
        </div>
      </div>

      <div class="tool-info">
        <div class="result-hero">
          <div class="result-label">Maturity Amount</div>
          <div class="result-amount" id="fdMaturity">₹1,22,505</div>
          <div class="result-breakdown">
            <div class="breakdown-item">
              <div class="breakdown-label">Principal</div>
              <div class="breakdown-value" id="fdPrincipal2">₹1,00,000</div>
            </div>
            <div class="breakdown-item">
              <div class="breakdown-label">Interest</div>
              <div class="breakdown-value" id="fdInterest">₹22,505</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-inner"><div class="footer-brand"><a href="/" class="logo">Calc🥷Ninja</a></div></div>
  <div class="footer-bottom"><p>© 2025 CalcNinja</p></div>
</footer>

<script>
function calculateFD() {
  const p = parseFloat(document.getElementById('fdPrincipal').value) || 0;
  const r = parseFloat(document.getElementById('fdRate').value) || 0;
  const t = parseFloat(document.getElementById('fdYears').value) || 0;

  const a = p * Math.pow(1 + r/(100*4), 4*t);
  const interest = a - p;

  document.getElementById('fdMaturity').textContent = formatINR(a);
  document.getElementById('fdPrincipal2').textContent = formatINR(p);
  document.getElementById('fdInterest').textContent = formatINR(interest);
}

function formatINR(n) {
  if (n >= 100000) return '₹' + (n/100000).toFixed(2) + ' L';
  if (n >= 1000) return '₹' + (n/1000).toFixed(2) + ' K';
  return '₹' + n.toFixed(2);
}

document.addEventListener('DOMContentLoaded', () => {
  calculateFD();
  document.documentElement.setAttribute('data-theme', localStorage.getItem('cn_theme') || 'light');
});

function toggleTheme() {
  const html = document.documentElement;
  const theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', theme);
  localStorage.setItem('cn_theme', theme);
}

function toggleMenu() { document.getElementById('mobileNav').classList.toggle('open'); }
</script>
</body>
</html>
