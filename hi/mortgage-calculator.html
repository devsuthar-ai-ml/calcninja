<!DOCTYPE html>
<html lang="hi" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mortgage कैलकुलेटर | CalcNinja</title>
<meta name="description" content="फ्री Mortgage कैलकुलेटर। Home loan को आसानी से calculate करें।">
<meta name="keywords" content="mortgage calculator, home loan calculator, mortgage payment">
<link rel="canonical" href="https://calcninja.vercel.app/hi/mortgage-calculator">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2412465343847193" crossorigin="anonymous"></script>
</head>
<body>
<header id="site-header">
  <a href="/" class="logo">Calc🥷Ninja</a>
  <nav class="desktop-nav"><a href="/">होम</a><a href="/tools/mortgage-calculator">English</a></nav>
  <div class="header-actions"><button class="theme-toggle" onclick="toggleTheme()">🌙</button><button class="hamburger" onclick="toggleMenu()">☰</button></div>
</header>

<nav class="mobile-nav" id="mobileNav">
  <a href="/" onclick="toggleMenu()">होम</a><a href="/tools/mortgage-calculator" onclick="toggleMenu()">English</a>
</nav>

<main>
  <div class="tool-page">
    <div class="tool-header">
      <h1>🏠 Mortgage कैलकुलेटर</h1>
      <p>Home loan payment को तुरंत निकालें</p>
    </div>

    <div class="tool-content">
      <div class="tool-form">
        <div class="form-group">
          <label>Loan Amount (₹)</label>
          <input type="number" id="mortPrincipal" value="5000000" min="0" step="100000" oninput="calculateMortgage()" class="form-input">
        </div>
        <div class="form-group">
          <label>Interest Rate (%)</label>
          <input type="number" id="mortRate" value="7.5" min="0" max="25" step="0.25" oninput="calculateMortgage()" class="form-input">
        </div>
        <div class="form-group">
          <label>Tenure (साल)</label>
          <input type="number" id="mortYears" value="20" min="1" max="30" step="1" oninput="calculateMortgage()" class="form-input">
        </div>
      </div>

      <div class="tool-info">
        <div class="result-hero">
          <div class="result-label">Monthly Payment</div>
          <div class="result-amount" id="mortMonthly">₹29,545</div>
          <div class="result-breakdown">
            <div class="breakdown-item">
              <div class="breakdown-label">Total Payment</div>
              <div class="breakdown-value" id="mortTotal">₹70,90,800</div>
            </div>
            <div class="breakdown-item">
              <div class="breakdown-label">Total Interest</div>
              <div class="breakdown-value" id="mortInterest">₹20,90,800</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-inner"><div class="footer-brand"><a href="/" class="logo">Calc🥷Ninja</a></div></div>
  <div class="footer-bottom"><p>© 2025 CalcNinja</p></div>
</footer>

<script>
function calculateMortgage() {
  const p = parseFloat(document.getElementById('mortPrincipal').value) || 0;
  const r = parseFloat(document.getElementById('mortRate').value) || 0;
  const t = parseFloat(document.getElementById('mortYears').value) || 0;

  const monthlyRate = r / 12 / 100;
  const months = t * 12;
  const emi = (p * monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
  const totalPayment = emi * months;
  const totalInterest = totalPayment - p;

  document.getElementById('mortMonthly').textContent = formatINR(emi);
  document.getElementById('mortTotal').textContent = formatINR(totalPayment);
  document.getElementById('mortInterest').textContent = formatINR(totalInterest);
}

function formatINR(n) {
  if (n >= 10000000) return '₹' + (n/10000000).toFixed(2) + ' Cr';
  if (n >= 100000) return '₹' + (n/100000).toFixed(2) + ' L';
  return '₹' + (n/1000).toFixed(2) + ' K';
}

document.addEventListener('DOMContentLoaded', () => {
  calculateMortgage();
  document.documentElement.setAttribute('data-theme', localStorage.getItem('cn_theme') || 'light');
});

function toggleTheme() {
  const html = document.documentElement;
  const theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', theme);
  localStorage.setItem('cn_theme', theme);
}

function toggleMenu() { document.getElementById('mobileNav').classList.toggle('open'); }
</script>
</body>
</html>
