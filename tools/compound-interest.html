<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Interest Calculator | CalcNinja</title>
<meta name="description" content="Free compound interest calculator. Calculate compound interest with daily, monthly, quarterly, yearly compounding.">
<meta name="keywords" content="compound interest calculator, compound interest formula, interest calculator">
<link rel="canonical" href="https://calcninja.vercel.app/tools/compound-interest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header id="site-header">
  <a href="/" class="logo">Calc🥷Ninja</a>
  <nav class="desktop-nav"><a href="/">Home</a><a href="/#tools">Tools</a></nav>
  <div class="header-actions"><button class="theme-toggle" onclick="toggleTheme()">🌙</button><button class="hamburger" onclick="toggleMenu()">☰</button></div>
</header>

<nav class="mobile-nav" id="mobileNav">
  <a href="/" onclick="toggleMenu()">Home</a><a href="/#tools" onclick="toggleMenu()">Tools</a>
</nav>

<main>
  <div class="tool-page">
    <div class="tool-header">
      <h1>📊 Compound Interest Calculator</h1>
      <p>Calculate compound interest with different compounding frequencies</p>
    </div>

    <div class="tool-content">
      <div class="tool-form">
        <div class="form-group">
          <label>Principal (₹)</label>
          <input type="number" id="ciPrincipal" value="100000" min="0" step="10000" oninput="calculateCI()" class="form-input">
        </div>
        <div class="form-group">
          <label>Rate (%)</label>
          <input type="number" id="ciRate" value="8" min="0" max="30" step="0.25" oninput="calculateCI()" class="form-input">
        </div>
        <div class="form-group">
          <label>Time (Years)</label>
          <input type="number" id="ciYears" value="5" min="0" step="0.5" oninput="calculateCI()" class="form-input">
        </div>
        <div class="form-group">
          <label>Compounding</label>
          <select id="ciFreq" onchange="calculateCI()" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px">
            <option value="1">Annually</option>
            <option value="2">Half Yearly</option>
            <option value="4">Quarterly</option>
            <option value="12">Monthly</option>
            <option value="365">Daily</option>
          </select>
        </div>
      </div>

      <div class="tool-info">
        <div class="result-hero">
          <div class="result-label">Amount</div>
          <div class="result-amount" id="ciAmount">₹1,46,933</div>
          <div class="result-breakdown">
            <div class="breakdown-item">
              <div class="breakdown-label">Principal</div>
              <div class="breakdown-value" id="ciPrincipalDisp">₹1,00,000</div>
            </div>
            <div class="breakdown-item">
              <div class="breakdown-label">Interest</div>
              <div class="breakdown-value" id="ciInterest">₹46,933</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-inner"><div class="footer-brand"><a href="/" class="logo">Calc🥷Ninja</a></div></div>
  <div class="footer-bottom"><p>© 2025 CalcNinja</p></div>
</footer>

<script>
function calculateCI() {
  const p = parseFloat(document.getElementById('ciPrincipal').value) || 0;
  const r = parseFloat(document.getElementById('ciRate').value) || 0;
  const t = parseFloat(document.getElementById('ciYears').value) || 0;
  const n = parseFloat(document.getElementById('ciFreq').value) || 1;

  const a = p * Math.pow(1 + r/(100*n), n*t);
  const ci = a - p;

  document.getElementById('ciAmount').textContent = formatINR(a);
  document.getElementById('ciPrincipalDisp').textContent = formatINR(p);
  document.getElementById('ciInterest').textContent = formatINR(ci);
}

function formatINR(n) {
  if (n >= 100000) return '₹' + (n/100000).toFixed(2) + ' L';
  if (n >= 1000) return '₹' + (n/1000).toFixed(2) + ' K';
  return '₹' + n.toFixed(2);
}

document.addEventListener('DOMContentLoaded', () => {
  calculateCI();
  document.documentElement.setAttribute('data-theme', localStorage.getItem('cn_theme') || 'light');
});

function toggleTheme() {
  const html = document.documentElement;
  const theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', theme);
  localStorage.setItem('cn_theme', theme);
}

function toggleMenu() { document.getElementById('mobileNav').classList.toggle('open'); }
</script>
</body>
</html>
