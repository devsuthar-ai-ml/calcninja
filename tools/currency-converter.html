<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Converter | USD to INR | CalcNinja</title>
<meta name="description" content="Free currency converter. Convert between USD, EUR, GBP, JPY and INR. Live exchange rates.">
<meta name="keywords" content="currency converter, usd to inr converter, currency conversion calculator, exchange rate">
<link rel="canonical" href="https://calcninja.vercel.app/tools/currency-converter">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2412465343847193" crossorigin="anonymous"></script>
</head>
<body>
<header id="site-header">
  <a href="/" class="logo">Calc🥷Ninja</a>
  <nav class="desktop-nav"><a href="/">Home</a><a href="/#tools">Tools</a></nav>
  <div class="header-actions"><button class="theme-toggle" onclick="toggleTheme()">🌙</button><button class="hamburger" onclick="toggleMenu()">☰</button></div>
</header>

<nav class="mobile-nav" id="mobileNav">
  <a href="/" onclick="toggleMenu()">Home</a><a href="/#tools" onclick="toggleMenu()">Tools</a>
</nav>

<main>
  <div class="tool-page">
    <div class="tool-header">
      <h1>💱 Currency Converter</h1>
      <p>Convert between currencies with latest rates</p>
    </div>

    <div class="tool-content">
      <div class="tool-form">
        <div class="form-group">
          <label>Amount</label>
          <input type="number" id="currFrom" value="1" step="0.01" oninput="convertCurrency()" class="form-input">
        </div>

        <div class="form-group">
          <label>From Currency</label>
          <select id="currFromCode" onchange="convertCurrency()" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px">
            <option value="USD">USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="JPY">JPY - Japanese Yen</option>
            <option value="INR" selected>INR - Indian Rupee</option>
          </select>
        </div>

        <div class="form-group">
          <label>To Currency</label>
          <select id="currToCode" onchange="convertCurrency()" style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px">
            <option value="USD" selected>USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="JPY">JPY - Japanese Yen</option>
            <option value="INR">INR - Indian Rupee</option>
          </select>
        </div>
      </div>

      <div class="tool-info">
        <div class="result-hero">
          <div style="font-size:2rem;margin-bottom:1rem" id="currDisplay">₹83.50</div>
          <div style="font-size:0.9rem;color:var(--text-muted)" id="currRate">1 USD = ₹83.50 INR</div>
        </div>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="footer-inner"><div class="footer-brand"><a href="/" class="logo">Calc🥷Ninja</a></div></div>
  <div class="footer-bottom"><p>© 2025 CalcNinja</p></div>
</footer>

<script>
const exchangeRates = {
  'USD': 1,
  'EUR': 0.92,
  'GBP': 0.79,
  'JPY': 149.50,
  'INR': 83.50
};

function convertCurrency() {
  const amount = parseFloat(document.getElementById('currFrom').value) || 1;
  const fromCode = document.getElementById('currFromCode').value;
  const toCode = document.getElementById('currToCode').value;

  const fromRate = exchangeRates[fromCode];
  const toRate = exchangeRates[toCode];

  const usdAmount = amount / fromRate;
  const result = usdAmount * toRate;

  const symbols = {
    'USD': '$',
    'EUR': '€',
    'GBP': '£',
    'JPY': '¥',
    'INR': '₹'
  };

  document.getElementById('currDisplay').textContent = symbols[toCode] + result.toFixed(2);
  document.getElementById('currRate').textContent = '1 ' + fromCode + ' = ' + (toRate / fromRate).toFixed(2) + ' ' + toCode;
}

document.addEventListener('DOMContentLoaded', () => {
  convertCurrency();
  document.documentElement.setAttribute('data-theme', localStorage.getItem('cn_theme') || 'light');
});

function toggleTheme() {
  const html = document.documentElement;
  const theme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', theme);
  localStorage.setItem('cn_theme', theme);
}

function toggleMenu() { document.getElementById('mobileNav').classList.toggle('open'); }
</script>
</body>
</html>
